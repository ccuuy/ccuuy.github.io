<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>霓虹决斗 4.2 - Balance & Visuals</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Press Start 2P', cursive;
            overflow: hidden;
            color: white;
        }

        #game-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 100px rgba(125, 0, 255, 0.2);
            width: 100%;
            height: 100%;
            max-width: 177.78vh; /* 16:9 */
            max-height: 56.25vw;
            border: 2px solid #333;
            overflow: hidden;
            background: #000;
        }

        /* CRT 扫描线效果 */
        .crt-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            pointer-events: none; z-index: 15;
        }
        .crt-overlay::after {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: rgba(18, 16, 16, 0.05); opacity: 0; z-index: 2;
            pointer-events: none; animation: flicker 0.15s infinite;
        }
        @keyframes flicker { 0% { opacity: 0.02; } 50% { opacity: 0.05; } 100% { opacity: 0.02; } }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            filter: contrast(1.1) brightness(1.1);
        }

        /* --- 界面层 --- */
        .overlay-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.92);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 20; transition: opacity 0.3s;
        }

        .hidden {
            display: none !important;
            opacity: 0;
            pointer-events: none;
        }

        h1 {
            font-size: 5vw;
            background: -webkit-linear-gradient(#00c3ff, #ff0f5b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 0px 20px rgba(255,255,255,0.2);
            margin-bottom: 40px; text-align: center; line-height: 1.2;
            animation: pulseTitle 3s infinite ease-in-out;
        }
        @keyframes pulseTitle {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(0,255,255,0.5)); }
            50% { transform: scale(1.02); filter: drop-shadow(0 0 20px rgba(255,15,91,0.5)); }
        }

        .btn {
            background: rgba(0,0,0,0.5); color: #fff; border: 2px solid #00c3ff;
            padding: 15px 40px; font-family: inherit; font-size: 16px;
            cursor: pointer; text-transform: uppercase; margin: 10px;
            transition: all 0.2s; min-width: 200px;
            box-shadow: 0 0 10px #00c3ff;
            text-shadow: 2px 2px 0 #000;
        }
        .btn:hover { background: #00c3ff; color: #000; box-shadow: 0 0 30px #00c3ff; transform: scale(1.05); border-color: #fff; }

        /* 选人界面 */
        .char-select-wrapper {
            display: flex; justify-content: space-around; width: 95%; height: 60%; margin-bottom: 20px;
        }
        .player-panel {
            width: 45%; border: 2px solid #444; padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            display: flex; flex-direction: column; gap: 10px; overflow-y: auto;
            backdrop-filter: blur(5px);
        }
        .p1-panel { border-color: #ff416c; box-shadow: inset 0 0 20px rgba(255, 65, 108, 0.2); }
        .p2-panel { border-color: #00c3ff; box-shadow: inset 0 0 20px rgba(0, 195, 255, 0.2); }
        
        .panel-title { font-size: 18px; margin-bottom: 10px; text-align: center; text-transform: uppercase; letter-spacing: 2px; }

        .char-card {
            padding: 15px; border: 1px solid #444; cursor: pointer; transition: 0.2s; position: relative; background: rgba(0,0,0,0.7);
        }
        .char-card:hover { background: rgba(255, 255, 255, 0.1); border-color: #888; }
        .char-card.selected { background: #222; border-color: #fff; box-shadow: 0 0 15px rgba(255,255,255,0.3); }
        
        .char-name { display: block; font-size: 14px; margin-bottom: 5px; font-weight: bold; }
        .char-desc { display: block; font-size: 9px; line-height: 1.4; color: #aaa; }
        .char-card.selected .char-desc { color: #ccc; }

        /* 游戏 HUD */
        #hud-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: none; z-index: 10;
        }
        
        .top-hud {
            padding: 20px 40px;
            display: flex; justify-content: space-between; align-items: flex-start;
        }

        .player-stats { width: 40%; display: flex; flex-direction: column; gap: 4px; }
        
        .bar-frame { width: 100%; height: 25px; background: rgba(10,10,10,0.9); border: 2px solid #555; transform: skewX(-20deg); overflow: hidden; box-shadow: 0 5px 10px rgba(0,0,0,0.5); }
        .skill-bar-group { display: flex; gap: 5px; width: 80%; height: 8px; margin-top: 4px; }
        .skill-frame { flex: 1; background: rgba(20,20,20,0.8); border: 1px solid #444; transform: skewX(-20deg); overflow: hidden; position: relative;}
        .dash-frame { width: 30%; height: 4px; background: rgba(80,80,80,0.5); transform: skewX(-20deg); margin-top: 4px; overflow: hidden; }
        
        .bar-fill { height: 100%; transition: width 0.1s linear; position: relative; }
        /* 给血条增加高光 */
        .bar-fill::after { content: ''; position: absolute; top:0; left:0; width: 100%; height: 50%; background: rgba(255,255,255,0.2); }
        
        #p1-hp-fill { background: linear-gradient(90deg, #b3003b, #ff0f5b); box-shadow: 0 0 15px #ff0f5b; }
        #p1-ds-fill { background: #00ffaa; }
        #p2-hp-fill { background: linear-gradient(90deg, #0077ff, #00c3ff); box-shadow: 0 0 15px #00c3ff; float: right; }
        #p2-ds-fill { background: #00ffaa; float: right; }

        .sp-fill { background: #ffd700; box-shadow: 0 0 5px #ffd700; width: 0%; height: 100%; }
        
        #timer-box {
            position: absolute; left: 50%; top: 15px; transform: translateX(-50%) skewX(-10deg);
            width: 70px; height: 60px; background: rgba(0,0,0,0.8); border: 2px solid #fff;
            display: flex; justify-content: center; align-items: center; font-size: 28px; color: #fff;
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        #controls-hint {
            position: absolute; bottom: 0; left: 0; width: 100%; padding: 15px 30px;
            display: flex; justify-content: space-between; font-size: 11px; 
            color: rgba(255,255,255,0.8); background: linear-gradient(to top, rgba(0,0,0,0.95), rgba(0,0,0,0)); 
            text-shadow: 1px 1px 0 #000;
        }
        .key { background: rgba(255,255,255,0.15); padding: 3px 6px; border-radius: 3px; color: #fff; font-weight: bold; margin: 0 2px; border: 1px solid rgba(255,255,255,0.3); }

        .settings-row { display: flex; align-items: center; gap: 20px; margin: 15px 0; }
        select, input { padding: 8px; background: #000; color: #fff; border: 1px solid #fff; font-family: inherit; font-size: 16px; }

        #result-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 30; text-shadow: 4px 4px 0 #000; }
        #result-title { font-size: 60px; margin-bottom: 30px; color: #fff; text-transform: uppercase; }
        
        .shake-anim { animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="crt-overlay"></div>
    <canvas id="gameCanvas"></canvas>

    <!-- 主菜单 -->
    <div id="main-menu" class="overlay-screen">
        <h1>NEON DUEL<br><span style="font-size: 30px; color: #fff; text-shadow: 0 0 10px #fff;">REDUX</span></h1>
        <button class="btn" onclick="goToCharSelect()">START GAME</button>
        <button class="btn" onclick="openSettings('menu')">SETTINGS</button>
    </div>

    <!-- 选人界面 -->
    <div id="char-select" class="overlay-screen hidden">
        <h2 style="margin-bottom: 20px;">CHOOSE YOUR FIGHTER</h2>
        <div class="settings-row">
            <label>TIME LIMIT:</label>
            <select id="timer-select">
                <option value="99">99s</option>
                <option value="120">120s</option>
                <option value="-1">Infinite</option>
            </select>
        </div>

        <div class="char-select-wrapper">
            <div class="player-panel p1-panel">
                <div class="panel-title" style="color: #ff416c;">PLAYER 1</div>
                <div id="p1-list"></div>
            </div>
            <div class="player-panel p2-panel">
                <div class="panel-title" style="color: #00c3ff;">PLAYER 2</div>
                <div id="p2-list"></div>
            </div>
        </div>
        
        <div>
            <button class="btn" onclick="goToMenu()">BACK</button>
            <button class="btn" onclick="launchGame()">FIGHT!</button>
        </div>
    </div>

    <!-- 设置菜单 -->
    <div id="settings-menu" class="overlay-screen hidden" style="background: rgba(0,0,0,0.85);">
        <h2>PAUSED</h2>
        <div class="settings-row">
            <label>VOLUME:</label>
            <input type="range" min="0" max="100" value="50" oninput="setVolume(this.value)">
        </div>
        <div id="pause-buttons" class="hidden">
            <button class="btn" onclick="resumeGame()">RESUME</button>
            <button class="btn" onclick="restartGame()">RESTART</button>
            <button class="btn" onclick="quitGame()">MAIN MENU</button>
        </div>
        <div id="menu-settings-buttons" class="hidden">
            <button class="btn" onclick="goToMenu()">BACK</button>
        </div>
    </div>

    <!-- 结算界面 -->
    <div id="result-screen" class="overlay-screen hidden" style="background: rgba(0,0,0,0.8);">
        <div id="result-box">
            <div id="result-title">P1 WINS</div>
            <button class="btn" onclick="restartGame()">REMATCH</button>
            <button class="btn" onclick="quitGame()">MENU</button>
        </div>
    </div>

    <!-- 游戏 HUD -->
    <div id="hud-layer">
        <div class="top-hud">
            <!-- P1 Bars -->
            <div class="player-stats">
                <div class="bar-frame"><div id="p1-hp-fill" class="bar-fill" style="width: 100%"></div></div>
                <div class="skill-bar-group">
                    <div class="skill-frame"><div id="p1-sp1-fill" class="sp-fill"></div><span style="position:absolute; top:0; left:2px; font-size:6px; color:#fff;">L (30%)</span></div>
                    <div class="skill-frame"><div id="p1-sp2-fill" class="sp-fill"></div><span style="position:absolute; top:0; left:2px; font-size:6px; color:#fff;">U (50%)</span></div>
                    <div class="skill-frame"><div id="p1-sp3-fill" class="sp-fill"></div><span style="position:absolute; top:0; left:2px; font-size:6px; color:#fff;">O (90%)</span></div>
                </div>
                <div class="dash-frame"><div id="p1-ds-fill" class="bar-fill" style="width: 100%"></div></div>
            </div>
            
            <div id="timer-box">99</div>
            
            <!-- P2 Bars -->
            <div class="player-stats" style="align-items: flex-end;">
                <div class="bar-frame"><div id="p2-hp-fill" class="bar-fill" style="width: 100%"></div></div>
                <div class="skill-bar-group" style="flex-direction: row-reverse;">
                    <div class="skill-frame"><div id="p2-sp1-fill" class="sp-fill"></div><span style="position:absolute; top:0; right:2px; font-size:6px; color:#fff;">3 (30%)</span></div>
                    <div class="skill-frame"><div id="p2-sp2-fill" class="sp-fill"></div><span style="position:absolute; top:0; right:2px; font-size:6px; color:#fff;">4 (50%)</span></div>
                    <div class="skill-frame"><div id="p2-sp3-fill" class="sp-fill"></div><span style="position:absolute; top:0; right:2px; font-size:6px; color:#fff;">6 (90%)</span></div>
                </div>
                <div class="dash-frame"><div id="p2-ds-fill" class="bar-fill" style="width: 100%"></div></div>
            </div>
        </div>

        <div id="controls-hint">
            <div style="color: #ff416c;">P1: <span class="key">WASD</span> Move <span class="key">J</span> Atk <span class="key">I</span> Dash <span class="key">L</span> Beam <span class="key">U</span> Uppercut <span class="key">O</span> Ult</div>
            <div style="color: #00c3ff;">P2: <span class="key">Arrows</span> Move <span class="key">1</span> Atk <span class="key">5</span> Dash <span class="key">3</span> Beam <span class="key">4</span> Uppercut <span class="key">6</span> Ult</div>
        </div>
    </div>
</div>

<script>
    // --- 全局配置 ---
    const WORLD_W = 3840; 
    const WORLD_H = 2160;
    const GRAVITY = 0.65;
    const GROUND_Y = WORLD_H - 120;
    
    // --- 角色数据 (Balance Changes Applied) ---
    const CHAR_DATA = {
        blade: {
            id: 'blade', name: 'Neon Blade', 
            desc: 'Balanced Fighter. Good range.',
            hp: 135, speed: 10, jump: -20, width: 45, height: 120, // HP Buffed
            passive: 'Double Jump',
            color: '#ff0f5b',
            damage: { light: 5, heavy: 12 }, // Dmg Buffed slightly
            skills: [
                { cost: 90, id: 'beam', name: 'Beam Slash' },
                { cost: 150, id: 'rising', name: 'Rising Storm' },
                { cost: 270, id: 'storm', name: 'Blade Storm' }
            ]
        },
        titan: {
            id: 'titan', name: 'Cyber Titan', 
            desc: 'Heavy Tank. Slow but deadly.',
            hp: 220, speed: 6, jump: -18, width: 80, height: 150, // HP Massive Buff, Speed nerf
            passive: 'Tank Body', 
            color: '#00ff00',
            damage: { light: 8, heavy: 18 },
            skills: [
                { cost: 90, id: 'smash', name: 'Ground Smash' },
                { cost: 150, id: 'shield', name: 'Titan Shield' },
                { cost: 270, id: 'meteor', name: 'Meteor Strike' }
            ]
        },
        phantom: {
            id: 'phantom', name: 'Phantom', 
            desc: 'Assassin. High burst, low HP.',
            hp: 100, speed: 13, jump: -22, width: 40, height: 110, // HP Slight Buff from 95
            passive: 'Triple Jump', 
            color: '#aa00ff',
            damage: { light: 4, heavy: 10 },
            skills: [
                { cost: 90, id: 'fan', name: 'Kunai Fan' },
                { cost: 150, id: 'trap', name: 'Void Trap' },
                { cost: 270, id: 'kill', name: 'Shadow Kill' } // Nerfed mechanism
            ]
        }
    };

    // 地图生成
    const PLATFORMS = [
        {x: 0, y: GROUND_Y, w: WORLD_W, h: 200, isGround: true},
        {x: 200, y: 1800, w: 400, h: 30},
        {x: 700, y: 1600, w: 400, h: 30},
        {x: 100, y: 1400, w: 300, h: 30},
        {x: 500, y: 1200, w: 300, h: 30},
        {x: 1500, y: 1700, w: 800, h: 30},
        {x: 1300, y: 1300, w: 400, h: 30},
        {x: 2100, y: 1300, w: 400, h: 30},
        {x: 1700, y: 900, w: 400, h: 30},
        {x: 3200, y: 1800, w: 400, h: 30},
        {x: 2700, y: 1600, w: 400, h: 30},
        {x: 3400, y: 1400, w: 300, h: 30},
        {x: 3000, y: 1200, w: 300, h: 30},
        {x: 1000, y: 600, w: 300, h: 30},
        {x: 2500, y: 600, w: 300, h: 30},
        {x: 1700, y: 400, w: 400, h: 30}
    ];

    // --- 引擎变量 ---
    const canvas = document.getElementById('gameCanvas');
    const c = canvas.getContext('2d');
    const container = document.getElementById('game-container');

    canvas.width = 1920;
    canvas.height = 1080;

    let gameState = 'menu';
    let masterVol = 0.5;
    let gameTimer = 99;
    let timerInterval;
    
    let p1Char = 'blade';
    let p2Char = 'blade';
    let startTimerValue = 99;

    let player1, player2;
    let projectiles = [];
    let particles = [];
    let floatTexts = []; // 飘字系统
    let items = [];
    let bgParticles = [];
    let afterimages = [];
    
    const camera = { x: 0, y: 0, scale: 1 };
    
    let hitStopFrame = 0;
    let shakeIntensity = 0;
    let shakeDecay = 0.9;

    let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // --- 音频 ---
    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        const now = audioCtx.currentTime;
        const v = masterVol;

        if (type === 'light') {
            osc.frequency.setValueAtTime(400, now);
            osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
            gain.gain.setValueAtTime(0.15 * v, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.1);
            osc.start(); osc.stop(now + 0.1);
        } else if (type === 'heavy') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, now);
            osc.frequency.exponentialRampToValueAtTime(10, now + 0.3);
            gain.gain.setValueAtTime(0.3 * v, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.3);
            osc.start(); osc.stop(now + 0.3);
        } else if (type === 'jump') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(150, now);
            osc.frequency.linearRampToValueAtTime(300, now + 0.1);
            gain.gain.setValueAtTime(0.1 * v, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.1);
            osc.start(); osc.stop(now + 0.1);
        } else if (type === 'skill') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(600, now);
            osc.frequency.exponentialRampToValueAtTime(200, now + 0.4);
            gain.gain.setValueAtTime(0.2 * v, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.4);
            osc.start(); osc.stop(now + 0.4);
        } else if (type === 'ult') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(100, now);
            osc.frequency.linearRampToValueAtTime(50, now + 1.0);
            gain.gain.setValueAtTime(0.5 * v, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 1.0);
            osc.start(); osc.stop(now + 1.0);
        } else if (type === 'teleport') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, now);
            osc.frequency.exponentialRampToValueAtTime(2000, now + 0.15);
            gain.gain.setValueAtTime(0.15 * v, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.15);
            osc.start(); osc.stop(now + 0.15);
        }
    }
    function setVolume(val) { masterVol = val / 100; }

    function triggerShake(intensity = 5) {
        shakeIntensity = intensity;
    }

    // --- 视觉系统 ---
    class FloatingText {
        constructor(x, y, text, color, size=20) {
            this.x = x; this.y = y; this.text = text; this.color = color;
            this.size = size; this.life = 60; this.vy = -2;
        }
        update() {
            this.x += (Math.random()-0.5);
            this.y += this.vy;
            this.vy *= 0.95;
            this.life--;
        }
        draw(ctx) {
            ctx.save();
            ctx.globalAlpha = Math.min(1, this.life/20);
            ctx.fillStyle = this.color;
            ctx.font = `${this.size}px 'Press Start 2P'`;
            ctx.shadowColor = '#000'; ctx.shadowBlur = 4;
            ctx.fillText(this.text, this.x, this.y);
            ctx.restore();
        }
    }

    function createParticles(x, y, color, n, speed = 10, life = 1) {
        for(let i=0; i<n; i++) {
            particles.push({
                x, y, vx: (Math.random()-0.5)*speed, vy: (Math.random()-0.5)*speed,
                color, life: life, maxLife: life, size: Math.random()*5+2,
                update() { 
                    this.x+=this.vx; this.y+=this.vy; this.life-=0.03; 
                    this.vx *= 0.92; this.vy *= 0.92;
                },
                draw(ctx) { 
                    ctx.save();
                    ctx.globalAlpha = this.life/this.maxLife; ctx.fillStyle=this.color; 
                    ctx.fillRect(this.x, this.y, this.size, this.size); 
                    ctx.restore();
                }
            });
        }
    }

    // --- 战斗类 ---
    class Fighter {
        constructor(x, y, config, isP1) {
            this.pos = { x, y };
            this.vel = { x: 0, y: 0 };
            this.config = config;
            this.isP1 = isP1;
            
            this.width = config.width;
            this.height = config.height;
            this.color = isP1 ? config.color : (config.color === '#ff0f5b' ? '#00c3ff' : config.color);
            
            this.hp = config.hp;
            this.maxHp = config.hp;
            this.sp = 0; this.maxSp = 300; 
            this.ds = 150; this.maxDs = 150;
            
            this.isDead = false;
            this.facingRight = isP1;
            this.onGround = false;
            this.jumps = 0;
            this.maxJumps = config.passive === 'Triple Jump' ? 3 : 2; 
            this.invul = 0; 
            this.shieldActive = false;
            
            this.attackBox = { x: 0, y: 0, w: 130, h: 80 };
            this.isAttacking = false;
            this.combo = 0;
            this.lastAtkTime = 0;
            
            this.isDashing = false;
            this.dashTime = 0;

            // 刺客大招状态
            this.isChargingUlt = false;
            this.ultChargeTimer = 0;
        }

        update() {
            if (this.isDead) return;

            // 刺客大招蓄力中，定身
            if (this.isChargingUlt) {
                this.vel.x = 0; this.vel.y = 0;
                this.ultChargeTimer--;
                if (this.ultChargeTimer <= 0) {
                    this.isChargingUlt = false;
                    this.executeShadowKill();
                }
                return;
            }

            if (this.sp < this.maxSp) this.sp += 0.5; 
            if (this.ds < this.maxDs) this.ds++;
            if (this.invul > 0) this.invul--;
            if (this.shieldActive && this.invul <= 0) this.shieldActive = false;

            if (this.isDashing) {
                this.dashTime--;
                if (this.dashTime <= 0) {
                    this.isDashing = false;
                    this.vel.x *= 0.2;
                } else {
                    if (this.dashTime % 2 === 0) {
                        afterimages.push({
                            x: this.pos.x, y: this.pos.y, w: this.width, h: this.height,
                            color: this.color, alpha: 0.5,
                            draw(ctx) {
                                ctx.save(); ctx.globalAlpha = this.alpha;
                                ctx.fillStyle = this.color; ctx.fillRect(this.x, this.y, this.w, this.h);
                                ctx.restore(); this.alpha -= 0.05;
                            }
                        });
                    }
                }
            }

            this.pos.x += this.vel.x;
            this.pos.y += this.vel.y;

            if (!this.isDashing) this.vel.y += GRAVITY;

            this.onGround = false;
            if (this.pos.x < 0) { this.pos.x = 0; this.vel.x = 0; }
            if (this.pos.x + this.width > WORLD_W) { this.pos.x = WORLD_W - this.width; this.vel.x = 0; }
            
            let wantDrop = (this.isP1 && keys.s) || (!this.isP1 && keys.down);

            PLATFORMS.forEach(plat => {
                if (this.vel.y >= 0 && 
                    this.pos.y + this.height <= plat.y + plat.h + this.vel.y + 5 &&
                    this.pos.y + this.height >= plat.y &&
                    this.pos.x + this.width > plat.x &&
                    this.pos.x < plat.x + plat.w
                ) {
                    if (plat.isGround || !wantDrop) {
                        this.pos.y = plat.y - this.height;
                        this.vel.y = 0;
                        this.onGround = true;
                        this.jumps = 0;
                    }
                }
            });

            this.attackBox.x = this.facingRight ? this.pos.x + this.width : this.pos.x - this.attackBox.w;
            this.attackBox.y = this.pos.y + 20;
            
            this.updateUI();
        }

        draw(ctx) {
            ctx.save();
            if (this.invul > 0 && Math.floor(Date.now()/50)%2===0) ctx.globalAlpha = 0.5;
            
            // 护盾特效
            if (this.shieldActive) {
                ctx.strokeStyle = '#0f0'; ctx.lineWidth = 4; ctx.shadowBlur = 15; ctx.shadowColor='#0f0';
                ctx.beginPath(); ctx.arc(this.pos.x+this.width/2, this.pos.y+this.height/2, 90, 0, Math.PI*2); ctx.stroke();
                ctx.fillStyle = 'rgba(0,255,0,0.1)'; ctx.fill();
                ctx.shadowBlur = 0;
            }

            // 刺客蓄力红色预警
            if (this.isChargingUlt) {
                ctx.fillStyle = `rgba(255,0,0,${Math.random()})`;
                ctx.fillRect(this.pos.x - 10, this.pos.y - 10, this.width + 20, this.height + 20);
            }

            // 主体
            ctx.fillStyle = this.color;
            ctx.shadowBlur = 15; ctx.shadowColor = this.color;
            
            let tilt = this.vel.x * 1.5;
            ctx.translate(this.pos.x + this.width/2, this.pos.y + this.height);
            ctx.rotate(tilt * Math.PI/180);
            ctx.translate(-(this.pos.x + this.width/2), -(this.pos.y + this.height));
            ctx.fillRect(this.pos.x, this.pos.y, this.width, this.height);
            
            // 内部核心细节
            ctx.fillStyle = '#fff'; ctx.shadowBlur = 5;
            ctx.fillRect(this.pos.x + this.width*0.3, this.pos.y + this.height*0.3, this.width*0.4, this.height*0.2);

            // 眼睛
            let eyeX = this.facingRight ? this.pos.x + this.width - 12 : this.pos.x + 2;
            ctx.fillStyle = '#0ff'; 
            if (this.isChargingUlt) ctx.fillStyle = '#f00';
            ctx.fillRect(eyeX, this.pos.y + 15, 10, 4);

            // 攻击特效
            if (this.isAttacking) {
                ctx.fillStyle = '#fff'; ctx.shadowBlur = 20;
                let atkX = this.attackBox.x;
                ctx.beginPath();
                if (this.facingRight) {
                    ctx.moveTo(this.pos.x + this.width, this.pos.y + 30);
                    ctx.lineTo(atkX + this.attackBox.w, this.pos.y - 20);
                    ctx.lineTo(atkX + this.attackBox.w, this.pos.y + this.attackBox.h + 20);
                } else {
                    ctx.moveTo(this.pos.x, this.pos.y + 30);
                    ctx.lineTo(atkX, this.pos.y - 20);
                    ctx.lineTo(atkX, this.pos.y + this.attackBox.h + 20);
                }
                ctx.fill();
            }
            ctx.restore();
        }

        move(dir) {
            if (this.isDashing || this.isChargingUlt) return;
            this.vel.x = dir * this.config.speed;
            if (dir !== 0) this.facingRight = dir > 0;
        }

        jump() {
            if (this.isChargingUlt) return;
            if (this.jumps < this.maxJumps) {
                this.vel.y = this.config.jump;
                this.jumps++;
                playSound('jump');
                createParticles(this.pos.x + this.width/2, this.pos.y + this.height, '#fff', 5);
            }
        }

        dash() {
            if (this.isChargingUlt) return;
            if (this.ds < this.maxDs) return;
            this.ds = 0;
            this.isDashing = true;
            this.dashTime = 12;
            this.vel.x = (this.facingRight ? 1 : -1) * 40;
            this.vel.y = 0;
            playSound('light');
            createParticles(this.pos.x + this.width/2, this.pos.y + this.height/2, '#fff', 10);
        }

        attack() {
            if (this.isAttacking || this.isChargingUlt) return;
            let now = Date.now();
            if (now - this.lastAtkTime < 800) this.combo = (this.combo + 1) % 3;
            else this.combo = 0;
            this.lastAtkTime = now;

            this.isAttacking = true;
            this.sp = Math.min(this.maxSp, this.sp + 10); 
            playSound(this.combo === 2 ? 'heavy' : 'light');
            
            setTimeout(() => {
                this.checkHit();
                this.isAttacking = false;
            }, 100);
        }

        useSkill(slot) {
            if (this.isChargingUlt) return;
            const costs = [90, 150, 270];
            const cost = costs[slot-1];
            
            if (this.sp < cost) {
                floatTexts.push(new FloatingText(this.pos.x, this.pos.y - 20, "NO ENERGY", "#888", 10));
                return;
            }
            this.sp -= cost;
            
            const dir = this.facingRight ? 1 : -1;
            const skillId = this.config.skills[slot-1].id;

            playSound(slot === 3 ? 'ult' : 'skill');
            floatTexts.push(new FloatingText(this.pos.x, this.pos.y - 50, this.config.skills[slot-1].name, this.color));

            // BLADE
            if (skillId === 'beam') { 
                projectiles.push(new Projectile(
                    this.pos.x + (this.facingRight?this.width:0), this.pos.y + 40,
                    dir * 30, 0, this.color, this, 15, { w:60, h:20 }
                ));
            }
            else if (skillId === 'rising') { 
                this.vel.y = -25; this.vel.x = dir * 5;
                this.invul = 30;
                createParticles(this.pos.x, this.pos.y, this.color, 20);
                let hit = new Projectile(this.pos.x, this.pos.y, 0, -25, this.color, this, 25, {w:100, h:100});
                hit.life = 20; projectiles.push(hit);
            }
            else if (skillId === 'storm') { 
                triggerShake(10);
                for(let i=0; i<12; i++) { // Increased count
                    setTimeout(() => {
                        let angle = (Math.random() - 0.5) * 1;
                        projectiles.push(new Projectile(
                            this.pos.x, this.pos.y + Math.random()*100,
                            dir * (18 + Math.random()*10), Math.sin(angle)*10, // Slower
                            this.color, this, 6, {w:40, h:10} // Lower DMG per hit
                        ));
                    }, i * 80);
                }
            }

            // TITAN
            else if (skillId === 'smash') { 
                this.vel.y = 20; 
                setTimeout(() => {
                    triggerShake(10);
                    projectiles.push(new Projectile(this.pos.x - 150, this.pos.y + this.height - 20, -12, 0, '#0f0', this, 15, {w:150, h:50}, 20));
                    projectiles.push(new Projectile(this.pos.x + this.width, this.pos.y + this.height - 20, 12, 0, '#0f0', this, 15, {w:150, h:50}, 20));
                }, 200);
            }
            else if (skillId === 'shield') { 
                this.shieldActive = true;
                this.invul = 180; 
                createParticles(this.pos.x, this.pos.y, '#0f0', 30);
            }
            else if (skillId === 'meteor') { 
                triggerShake(15);
                let target = this.isP1 ? player2 : player1;
                let tx = target.pos.x;
                // Increased delay to allow dodge
                floatTexts.push(new FloatingText(tx, target.pos.y - 150, "WARNING", "#f00", 15));
                setTimeout(() => {
                    projectiles.push(new Projectile(tx, -300, 0, 35, '#0f0', this, 60, {w:250, h:250}));
                }, 800); 
            }

            // PHANTOM
            else if (skillId === 'fan') { 
                for(let i=-1; i<=1; i++) {
                    projectiles.push(new Projectile(
                        this.pos.x + (this.facingRight?this.width:0), this.pos.y + 40,
                        dir * 22, i * 4, this.color, this, 8, {w:20, h:10}
                    ));
                }
            }
            else if (skillId === 'trap') { 
                let trap = new Projectile(this.pos.x, this.pos.y, 0, 0, '#aa00ff', this, 30, {w:this.width, h:this.height});
                trap.life = 600; trap.isTrap = true;
                projectiles.push(trap);
                this.pos.x += dir * -200;
                createParticles(this.pos.x, this.pos.y, '#fff', 10);
            }
            else if (skillId === 'kill') { 
                // Nerfed Mechanism
                let target = this.isP1 ? player2 : player1;
                createParticles(this.pos.x, this.pos.y, '#000', 30);
                
                // Teleport behind
                this.pos.x = target.pos.x + (target.facingRight ? -100 : 100);
                this.pos.y = target.pos.y;
                this.vel.x = 0; this.vel.y = 0;
                this.facingRight = this.pos.x < target.pos.x;
                
                // Start Charge
                this.isChargingUlt = true;
                this.ultChargeTimer = 30; // 0.5s delay @ 60fps
                playSound('teleport');
            }
        }

        // Phantom Ult Execution after delay
        executeShadowKill() {
            let target = this.isP1 ? player2 : player1;
            this.attack(); // Visual attack
            // Create a large hitbox
            let killHit = new Projectile(this.pos.x - 50, this.pos.y, 0, 0, '#aa00ff', this, 45, {w:200, h:100});
            killHit.life = 10; // Short active frame
            projectiles.push(killHit);
            triggerShake(15);
            createParticles(this.pos.x, this.pos.y, '#aa00ff', 40);
        }

        checkHit() {
            let target = this.isP1 ? player2 : player1;
            if (
                this.attackBox.x < target.pos.x + target.width &&
                this.attackBox.x + this.attackBox.w > target.pos.x &&
                this.attackBox.y < target.pos.y + target.height &&
                this.attackBox.y + this.attackBox.h > target.pos.y
            ) {
                let dmg = this.combo === 2 ? this.config.damage.heavy : this.config.damage.light;
                let type = this.combo === 2 ? 'heavy' : 'light';
                target.takeHit(dmg, this.pos.x, type);
            }
        }

        takeHit(dmg, srcX, type) {
            if (this.invul > 0) {
                if (this.shieldActive) {
                     createParticles(this.pos.x, this.pos.y, '#fff', 5);
                     floatTexts.push(new FloatingText(this.pos.x, this.pos.y, "BLOCK", "#fff"));
                     return;
                }
                return;
            }

            this.hp -= dmg;
            let dir = this.pos.x > srcX ? 1 : -1;
            this.vel.x = dir * (type === 'heavy' ? 20 : 8);
            this.vel.y = type === 'heavy' ? -15 : -5;
            
            this.invul = type === 'heavy' ? 40 : 20;
            hitStopFrame = type === 'heavy' ? 8 : 3;
            createParticles(this.pos.x + this.width/2, this.pos.y + 30, this.color, 10);
            
            let color = type === 'heavy' ? '#ff0000' : '#ffffff';
            floatTexts.push(new FloatingText(this.pos.x, this.pos.y, `-${dmg}`, color, type==='heavy'?30:20));

            if (type === 'heavy') triggerShake(8);

            if (this.hp <= 0) {
                this.hp = 0;
                this.isDead = true;
                endGame();
            }
            this.updateUI();
        }

        updateUI() {
            let p = this.isP1 ? 'p1' : 'p2';
            document.getElementById(`${p}-hp-fill`).style.width = (this.hp / this.maxHp) * 100 + '%';
            document.getElementById(`${p}-ds-fill`).style.width = (this.ds / this.maxDs) * 100 + '%';
            let sp = this.sp;
            document.getElementById(`${p}-sp1-fill`).style.width = Math.min(100, Math.max(0, (sp / 90)*100)) + '%';
            document.getElementById(`${p}-sp2-fill`).style.width = Math.min(100, Math.max(0, ((sp-90) / 60)*100)) + '%';
            document.getElementById(`${p}-sp3-fill`).style.width = Math.min(100, Math.max(0, ((sp-150) / 120)*100)) + '%';
        }
    }

    class Projectile {
        constructor(x, y, vx, vy, color, owner, dmg, size={w:20,h:20}, life=120) {
            this.pos = {x,y}; this.vel = {x:vx, y:vy};
            this.color = color; this.owner = owner; this.dmg = dmg;
            this.size = size;
            this.life = life;
            this.active = true;
            this.isTrap = false;
        }
        update() {
            this.life--;
            if (this.life <= 0) this.active = false;
            
            this.pos.x += this.vel.x; this.pos.y += this.vel.y;
            this.draw(c);
            
            let target = this.owner.isP1 ? player2 : player1;
            if (this.active && 
                this.pos.x < target.pos.x + target.width &&
                this.pos.x + this.size.w > target.pos.x &&
                this.pos.y < target.pos.y + target.height &&
                this.pos.y + this.size.h > target.pos.y) {
                
                if (!target.invul) {
                    if (this.isTrap) {
                        createParticles(this.pos.x, this.pos.y, this.color, 30, 15);
                        playSound('heavy');
                    }
                    target.takeHit(this.dmg, this.pos.x, 'heavy');
                    this.active = false;
                } else if (target.shieldActive) {
                    this.vel.x *= -1;
                    this.owner = target; 
                }
            }
        }
        draw(ctx) {
            ctx.save();
            ctx.fillStyle = this.color; ctx.shadowBlur=15; ctx.shadowColor=this.color;
            if (this.isTrap) {
                ctx.globalAlpha = 0.6 + Math.sin(Date.now()/100)*0.4;
                ctx.fillRect(this.pos.x, this.pos.y, this.size.w, this.size.h);
            } else {
                ctx.fillRect(this.pos.x, this.pos.y, this.size.w, this.size.h);
            }
            ctx.restore();
        }
    }

    // --- 核心逻辑 ---
    function initUI() {
        const p1List = document.getElementById('p1-list');
        const p2List = document.getElementById('p2-list');

        Object.values(CHAR_DATA).forEach(char => {
            p1List.appendChild(createCharCard(char, 'p1'));
            p2List.appendChild(createCharCard(char, 'p2'));
        });
        
        selectChar('p1', 'blade');
        selectChar('p2', 'blade');
        
        requestAnimationFrame(loop);
    }

    function createCharCard(char, pid) {
        const div = document.createElement('div');
        div.className = 'char-card';
        div.id = `card-${pid}-${char.id}`;
        div.onclick = () => selectChar(pid, char.id);
        div.innerHTML = `
            <span class="char-name" style="color:${char.color}">${char.name}</span>
            <span class="char-desc">${char.desc}</span>
            <div style="margin-top:5px; color:#888; font-size:8px;">
               HP:${char.hp} | SPD:${char.speed}
            </div>
        `;
        return div;
    }

    function selectChar(pid, charId) {
        if (pid === 'p1') p1Char = charId; else p2Char = charId;
        document.querySelectorAll(`#${pid}-list .char-card`).forEach(el => el.classList.remove('selected'));
        document.getElementById(`card-${pid}-${charId}`).classList.add('selected');
    }

    function goToCharSelect() { document.getElementById('main-menu').classList.add('hidden'); document.getElementById('char-select').classList.remove('hidden'); gameState = 'select'; }
    function goToMenu() { 
        document.querySelectorAll('.overlay-screen').forEach(el => el.classList.add('hidden'));
        document.getElementById('main-menu').classList.remove('hidden');
        document.getElementById('hud-layer').style.display = 'none';
        gameState = 'menu';
    }
    function openSettings(from) {
        document.getElementById('settings-menu').classList.remove('hidden');
        if (from === 'menu') {
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('menu-settings-buttons').classList.remove('hidden');
            document.getElementById('pause-buttons').classList.add('hidden');
            gameState = 'settings';
        } else {
            document.getElementById('pause-buttons').classList.remove('hidden');
            document.getElementById('menu-settings-buttons').classList.add('hidden');
            gameState = 'paused';
        }
    }
    function launchGame() {
        startTimerValue = parseInt(document.getElementById('timer-select').value);
        document.getElementById('char-select').classList.add('hidden');
        document.getElementById('hud-layer').style.display = 'block';
        restartGame();
    }
    function togglePause() { if (gameState === 'playing') openSettings('game'); else if (gameState === 'paused') resumeGame(); }
    function resumeGame() { document.getElementById('settings-menu').classList.add('hidden'); gameState = 'playing'; }
    function quitGame() { goToMenu(); }

    function restartGame() {
        gameState = 'playing';
        gameTimer = startTimerValue;
        document.getElementById('timer-box').innerText = startTimerValue === -1 ? '∞' : startTimerValue;
        document.getElementById('settings-menu').classList.add('hidden');
        document.getElementById('result-screen').classList.add('hidden');
        
        projectiles = []; items = []; particles = []; afterimages = []; floatTexts = [];
        
        player1 = new Fighter(400, 1600, CHAR_DATA[p1Char], true);
        player2 = new Fighter(WORLD_W - 400, 1600, CHAR_DATA[p2Char], false);
        
        if (timerInterval) clearInterval(timerInterval);
        if (startTimerValue !== -1) {
            timerInterval = setInterval(() => {
                if (gameState === 'playing') {
                    gameTimer--;
                    document.getElementById('timer-box').innerText = gameTimer;
                    if (gameTimer <= 0) endGame();
                }
            }, 1000);
        }
        player1.updateUI(); player2.updateUI();
    }

    function endGame() {
        gameState = 'gameover';
        clearInterval(timerInterval);
        document.getElementById('result-screen').classList.remove('hidden');
        const t = document.getElementById('result-title');
        if (player1.hp === player2.hp) { t.innerText = "DRAW"; t.style.color = "#fff"; }
        else if (player1.hp > player2.hp) { t.innerText = "P1 WINS"; t.style.color = player1.color; }
        else { t.innerText = "P2 WINS"; t.style.color = player2.color; }
    }

    function updateCamera() {
        const midX = (player1.pos.x + player1.width/2 + player2.pos.x + player2.width/2) / 2;
        const midY = (player1.pos.y + player1.height/2 + player2.pos.y + player2.height/2) / 2;

        const distX = Math.abs(player1.pos.x - player2.pos.x);
        const distY = Math.abs(player1.pos.y - player2.pos.y);
        
        let zoom = 1.2;
        if (distX > 800 || distY > 500) {
            let factor = Math.max(distX / 1600, distY / 800);
            zoom = Math.max(0.6, 1.2 - (factor - 0.5));
        }
        
        if (shakeIntensity > 0) {
            camera.x += (Math.random() - 0.5) * shakeIntensity;
            camera.y += (Math.random() - 0.5) * shakeIntensity;
            shakeIntensity *= shakeDecay;
            if(shakeIntensity < 0.5) shakeIntensity = 0;
        }

        camera.scale += (zoom - camera.scale) * 0.05;

        const viewW = canvas.width / camera.scale;
        const viewH = canvas.height / camera.scale;

        let camX = midX - viewW / 2;
        let camY = midY - viewH / 2;

        camX = Math.max(0, Math.min(camX, WORLD_W - viewW));
        camY = Math.max(0, Math.min(camY, WORLD_H - viewH));

        camera.x += (camX - camera.x) * 0.1;
        camera.y += (camY - camera.y) * 0.1;
    }

    // --- 新增：绘制赛博朋克背景 ---
    function drawBackground(ctx) {
        // 1. 深空渐变
        let grad = ctx.createLinearGradient(0, 0, 0, WORLD_H);
        grad.addColorStop(0, '#02000a');
        grad.addColorStop(1, '#1a0b2e');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, WORLD_W, WORLD_H);

        // 2. 复古太阳 (固定在远处)
        // 为了让太阳看起来远，我们根据 camera.x 移动它一点点 (parallax)
        let sunX = WORLD_W/2 + (camera.x - WORLD_W/2) * 0.9; 
        let sunY = GROUND_Y - 400;
        let sunGrad = ctx.createLinearGradient(sunX, sunY - 150, sunX, sunY + 150);
        sunGrad.addColorStop(0, '#ffcc00');
        sunGrad.addColorStop(1, '#ff0055');
        
        ctx.save();
        ctx.fillStyle = sunGrad;
        ctx.shadowBlur = 50; ctx.shadowColor = '#ff0055';
        ctx.beginPath(); ctx.arc(sunX, sunY, 200, 0, Math.PI*2); ctx.fill();
        
        // 太阳上的条纹
        ctx.fillStyle = 'rgba(26, 11, 46, 0.5)';
        for(let i=0; i<10; i++) {
            ctx.fillRect(sunX - 220, sunY + i*20 - 50, 440, 10 + i*2);
        }
        ctx.restore();

        // 3. 地面网格
        ctx.strokeStyle = 'rgba(255, 0, 255, 0.3)';
        ctx.lineWidth = 2;
        // 垂直线
        for (let i = 0; i <= WORLD_W; i += 200) {
            ctx.beginPath(); ctx.moveTo(i, GROUND_Y); ctx.lineTo(i, WORLD_H); ctx.stroke();
        }
        // 水平线 (透视感?) 简化为平行线
        for (let i = GROUND_Y; i <= WORLD_H; i += 100) {
            ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(WORLD_W, i); ctx.stroke();
        }
        
        // 4. 远景城市轮廓
        ctx.fillStyle = '#050014';
        ctx.beginPath();
        ctx.moveTo(0, GROUND_Y);
        for(let i=0; i<WORLD_W; i+=100) {
            let h = Math.sin(i)*50 + Math.cos(i*0.5)*100 + 200;
            ctx.lineTo(i, GROUND_Y - h);
            ctx.lineTo(i+80, GROUND_Y - h);
            ctx.lineTo(i+80, GROUND_Y);
        }
        ctx.lineTo(WORLD_W, GROUND_Y);
        ctx.fill();
    }

    // --- 游戏循环 ---
    function loop() {
        requestAnimationFrame(loop);
        
        c.fillStyle = '#000';
        c.fillRect(0, 0, canvas.width, canvas.height);

        if (gameState === 'playing' || gameState === 'gameover') {
            if (gameState === 'playing') {
                if (hitStopFrame > 0) {
                    hitStopFrame--;
                } else {
                    if (!player1.isDashing && !player1.isChargingUlt) {
                        player1.vel.x = 0;
                        if (keys.a) player1.move(-1); 
                        if (keys.d) player1.move(1); 
                    }
                    if (!player2.isDashing && !player2.isChargingUlt) {
                        player2.vel.x = 0;
                        if (keys.left) player2.move(-1); 
                        if (keys.right) player2.move(1); 
                    }

                    player1.update();
                    player2.update();
                    projectiles.forEach((p, i) => { p.update(); if(!p.active) projectiles.splice(i,1); });
                    particles.forEach((p, i) => { p.update(); if(p.life<=0) particles.splice(i,1); });
                    floatTexts.forEach((t, i) => { t.update(); if(t.life<=0) floatTexts.splice(i,1); });
                    updateCamera();
                }
            }

            // 渲染
            c.save();
            c.scale(camera.scale, camera.scale);
            c.translate(-camera.x, -camera.y);

            drawBackground(c);

            // 平台
            PLATFORMS.forEach(p => {
                c.shadowBlur = 0;
                c.fillStyle = '#111'; c.fillRect(p.x, p.y, p.w, p.h);
                // 霓虹边缘
                c.fillStyle = p.isGround ? '#ff0055' : '#00c3ff'; 
                c.shadowBlur = 10; c.shadowColor = c.fillStyle;
                c.fillRect(p.x, p.y, p.w, 5); 
                
                // 侧面格栅
                c.shadowBlur = 0;
                c.fillStyle = '#222'; 
                c.fillRect(p.x+5, p.y+10, p.w-10, p.h-20);
                c.fillStyle = '#333';
                for(let i=10; i<p.w; i+=20) {
                    c.fillRect(p.x+i, p.y+15, 5, p.h-30);
                }
            });

            afterimages.forEach((a, i) => { a.draw(c); if(a.alpha<=0) afterimages.splice(i,1); });
            player1.draw(c);
            player2.draw(c);
            projectiles.forEach(p => p.draw(c));
            particles.forEach(p => p.draw(c));
            floatTexts.forEach(t => t.draw(c));

            c.restore();
        }
    }

    const keys = { w:false, a:false, s:false, d:false, up:false, left:false, down:false, right:false };

    window.addEventListener('keydown', e => {
        if (gameState !== 'playing') return;
        let k = e.key.toLowerCase();
        
        if (k === 'a') keys.a = true;
        if (k === 'd') keys.d = true;
        if (k === 's') keys.s = true;
        if (k === 'w' || k === 'k') player1.jump();
        if (k === 'j') player1.attack();
        if (k === 'i') player1.dash();
        if (k === 'l') player1.useSkill(1);
        if (k === 'u') player1.useSkill(2);
        if (k === 'o') player1.useSkill(3);

        if (k === 'arrowleft') keys.left = true;
        if (k === 'arrowright') keys.right = true;
        if (k === 'arrowdown') keys.down = true;
        if (k === 'arrowup' || k === '2') player2.jump();
        if (k === '1') player2.attack();
        if (k === '5') player2.dash();
        if (k === '3') player2.useSkill(1);
        if (k === '4') player2.useSkill(2);
        if (k === '6') player2.useSkill(3);
        
        if (k === 'escape') togglePause();
    });

    window.addEventListener('keyup', e => {
        let k = e.key.toLowerCase();
        if (k === 'a') keys.a = false;
        if (k === 'd') keys.d = false;
        if (k === 's') keys.s = false;
        if (k === 'arrowleft') keys.left = false;
        if (k === 'arrowright') keys.right = false;
        if (k === 'arrowdown') keys.down = false;
    });

    initUI();
</script>
</body>
</html>

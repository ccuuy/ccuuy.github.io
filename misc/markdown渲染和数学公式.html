<p>但是此时出现问题，mathjax无法解析<code>\[\[</code>和<code>\(\)</code>中包裹的公式，因为其在之前的markdown渲染中就已经被删掉了反引号。</p>
<p>参考https://blog.yixiangzhilv.com/blogs/20220205110353.html，使用python_markdown_math解决了问题。</p></div><script type="text/javascript" src="../script.js"></script><script type="text/x-mathjax-config">
    MathJax.Hub.Config({
      config: ["MMLorHTML.js"],
      jax: ["input/TeX", "output/HTML-CSS", "output/NativeMML"],
      extensions: ["MathMenu.js", "MathZoom.js"]
    });
</script>
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/mathjax@2/MathJax.js?config=TeX-MML-AM_CHTML"></script></body>
